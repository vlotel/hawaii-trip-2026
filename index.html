<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ハワイ社員旅行 2026.09</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ハワイ旅行">
<meta name="theme-color" content="#0d9488">
</head>
<body>
<header>
  <button id="theme-toggle" class="theme-toggle" aria-label="表示テーマ切替">🌙</button>
  <h1>🌴 ハワイ社員旅行 <span class="period">2026.09.07-11</span></h1>
  <div id="countdown" class="countdown"></div>
</header>

<main>
  <!-- 行程表 -->
  <section id="itinerary" class="tab-panel active">
    <div id="next-event" class="next-event-card" style="display:none;"></div>
    <div id="trip-overview" class="card"></div>
    <div id="itinerary-list"></div>
    <div id="summary-card" class="card"></div>
  </section>

  <!-- 持ち物リスト -->
  <section id="packing" class="tab-panel">
    <div class="card">
      <div class="packing-header">
        <h2>持ち物チェックリスト</h2>
        <div class="packing-header-right">
          <span id="packing-progress"></span>
          <button id="packing-edit-mode-btn" class="packing-mode-btn">編集</button>
        </div>
      </div>
      <div class="packing-legend">🛒 買い物済み　/　🎒 パッキング済み</div>
      <div id="packing-list"></div>
      <div class="packing-add-form">
        <h3>アイテムを追加</h3>
        <input type="text" id="packing-add-text" placeholder="持ち物の名前" maxlength="40">
        <div class="packing-add-row">
          <select id="packing-add-category"></select>
          <input type="text" id="packing-add-newcategory" placeholder="新しいカテゴリ名" maxlength="20" style="display:none">
          <button id="packing-add-btn">追加</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ドライブ -->
  <section id="drive" class="tab-panel">
    <div id="drive-plan" class="card"></div>
    <div id="rental-car" class="card"></div>
    <div class="card">
      <h2>📍 3日目 立ち寄りスポット</h2>
      <p class="muted">ルート順(① 朝食 → ② 行き道 → ③ ハレイワ → ④ 海沿い → ⑤ 帰り道)で並べています。<strong>★＝行きたいところ(確定)</strong>、そのほかは周辺のおすすめです。各スポットの「📍 地図」ボタンからGoogleマップを開けます。</p>
      <div id="drive-list" class="guide-list"></div>
    </div>
  </section>

  <!-- メモ・候補地 -->
  <section id="notes" class="tab-panel">
    <div class="card">
      <h2>共有メモ</h2>
      <p class="muted">自由に書き込めるメモです。妻と同じ内容をリアルタイムで共有できます。</p>
      <textarea id="shared-memo" class="shared-memo-textarea" placeholder="ここに自由にメモを書いてください"></textarea>
    </div>
    <div class="card">
      <h2>検討事項・TODO</h2>
      <div id="todo-list"></div>
    </div>
    <div class="card">
      <h2>クレジットカード付帯 海外旅行保険</h2>
      <div id="insurance-info"></div>
    </div>
    <div class="card">
      <h2>ホテル情報</h2>
      <div id="hotel-info"></div>
    </div>
    <div class="card">
      <h2>観光・候補地メモ</h2>
      <div id="spots-list"></div>
    </div>
    <div class="card">
      <h2>出典</h2>
      <ul id="sources-list" class="muted"></ul>
    </div>
  </section>
</main>

<nav id="tabs">
  <button class="tab-btn active" data-tab="itinerary">行程表</button>
  <button class="tab-btn" data-tab="drive">ドライブ</button>
  <button class="tab-btn" data-tab="packing">持ち物</button>
  <button class="tab-btn" data-tab="notes">メモ</button>
</nav>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script src="data.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
